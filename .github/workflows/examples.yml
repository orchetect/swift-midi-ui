name: examples
permissions:
  contents: read

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'       # .md files anywhere in the repo
      - '**/LICENSE'    # LICENSE files anywhere in the repo
      - '**/.gitignore' # .gitignore files anywhere in the repo
      
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'       # .md files anywhere in the repo
      - '**/LICENSE'    # LICENSE files anywhere in the repo
      - '**/.gitignore' # .gitignore files anywhere in the repo
      
  workflow_dispatch:
    
  schedule:
    - cron: '25 12 * * *'   # once a day @ 12:25pm UTC (5:35am PST)

jobs:
  SwiftUI-Multiplatform:
    name: SwiftUI Multiplatform
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@main
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Bootstrap Platforms
      # Workaround for Xcode/GitHub runner issues finding simulators.
      # see https://github.com/actions/runner-images/issues/12758#issuecomment-3206748945
      run: xcrun simctl list
    - name: Download Platform(s)
      # Workaround for Xcode/GitHub runner issues finding simulators.
      # see https://github.com/actions/runner-images/issues/12758#issuecomment-3206748945
      run: xcodebuild -downloadPlatform iOS

    - name: Endpoint Pickers - Resolve Package Dependencies # needed because sometimes xcodebuild fails otherwise
      run: xcodebuild -project "Examples/SwiftUI Multiplatform/Endpoint Pickers/Endpoint Pickers.xcodeproj" -resolvePackageDependencies | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
    - name: Endpoint Pickers - Build (iOS) # by targeting a simulator device, we bypass requiring a Developer Team ID
      run: xcodebuild build -project "Examples/SwiftUI Multiplatform/Endpoint Pickers/Endpoint Pickers.xcodeproj" -scheme "Endpoint Pickers" -destination "generic/platform=iOS Simulator,name=Any iOS Simulator Device" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
    - name: Endpoint Pickers - Build (macOS)
      run: xcodebuild build -project "Examples/SwiftUI Multiplatform/Endpoint Pickers/Endpoint Pickers.xcodeproj" -scheme "Endpoint Pickers" -destination "generic/platform=macOS" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}

    - name: UI Example - Resolve Package Dependencies # needed because sometimes xcodebuild fails otherwise
      run: xcodebuild -project "Examples/SwiftUI Multiplatform/UI Example/UI Example.xcodeproj" -resolvePackageDependencies | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
    - name: UI Example - Build (iOS) # by targeting a simulator device, we bypass requiring a Developer Team ID
      run: xcodebuild build -project "Examples/SwiftUI Multiplatform/UI Example/UI Example.xcodeproj" -scheme "UI Example" -destination "generic/platform=iOS Simulator,name=Any iOS Simulator Device" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
    - name: UI Example - Build (macOS)
      run: xcodebuild build -project "Examples/SwiftUI Multiplatform/UI Example/UI Example.xcodeproj" -scheme "UI Example" -destination "generic/platform=macOS" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
